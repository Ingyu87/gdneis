  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="서울가동초등학교 나이스 입력 도우미">
  <meta name="twitter:description" content="학생 기록 작성 지원 웹도구. 학기말 종합의견, 자율·자치활동, 행동특성 및 종합의견 예시문장 작성을 돕습니다.">

  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./shared/css/neis-theme.css">
  <style>
    html,
    body {
      height: 100%;
      margin: 0;
    }

    .shell {
      min-height: 100%;
      display: flex;
      flex-direction: column;
      background: var(--neis-bg);
    }

    .frame-wrap {
      flex: 1;
      padding: 1rem;
    }

    .tab-frame {
      width: 100%;
      min-height: calc(100vh - 126px);
      border: 0;
      display: none;
    }

    .tab-frame.active {
      display: block;
    }
  </style>
</head>
<body class="neis-body">
  <div class="shell">
    <header class="neis-app-header">
      <div class="header-left">
        <span class="school-badge">서울가동초등학교</span>
        <span class="app-title">나이스 입력 도우미</span>
      </div>
      <div class="header-right">
        <span id="today-label"></span>
      </div>
    </header>

    <nav class="neis-tabbar" aria-label="주요 기능">
      <button class="neis-tab" type="button" data-tab="comments">학기말 종합의견</button>
      <button class="neis-tab" type="button" data-tab="activity">자율·자치활동 관리</button>
      <button class="neis-tab" type="button" data-tab="behavior">행동특성 및 종합의견</button>
    </nav>

    <main class="frame-wrap">
      <iframe id="frame-comments" class="tab-frame" src="./tabs/comments/index.html" title="학기말 종합의견"></iframe>
      <iframe id="frame-activity" class="tab-frame" src="./tabs/activity/index.html" title="자율·자치활동 관리"></iframe>
      <iframe id="frame-behavior" class="tab-frame" src="./tabs/behavior/index.html" title="행동특성 및 종합의견"></iframe>
    </main>
  </div>

  <script>
    const tabs = ["comments", "activity", "behavior"];
    const labels = {
      comments: "학기말 종합의견",
      activity: "자율·자치활동 관리",
      behavior: "행동특성 및 종합의견"
    };

    document.getElementById("today-label").textContent =
      new Intl.DateTimeFormat("ko-KR", { dateStyle: "medium" }).format(new Date());

    function activate(tab) {
      const next = tabs.includes(tab) ? tab : "activity";
      document.querySelectorAll(".neis-tab").forEach((button) => {
        button.classList.toggle("active", button.dataset.tab === next);
      });
      tabs.forEach((key) => {
        document.getElementById(`frame-${key}`).classList.toggle("active", key === next);
      });
      document.title = `${labels[next]} - 서울가동초 나이스 입력 도우미`;
      if (location.hash !== `#${next}`) location.hash = next;
    }

    document.querySelectorAll(".neis-tab").forEach((button) => {
      button.addEventListener("click", () => activate(button.dataset.tab));
    });
    window.addEventListener("hashchange", () => activate(location.hash.replace("#", "")));
    activate(location.hash.replace("#", ""));
  </script>
</body>
</html>
