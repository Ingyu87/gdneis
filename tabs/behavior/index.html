<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>행동특성 및 종합의견</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../../shared/css/neis-theme.css">
  <style>
    body { margin: 0; padding: 0; }
    .behavior-layout { display: grid; grid-template-columns: minmax(0, 1fr) minmax(320px, 0.9fr); gap: 1rem; }
    .field-stack { display: flex; flex-direction: column; gap: 0.35rem; margin-bottom: 0.9rem; }
    .field-stack label { font-size: 0.875rem; font-weight: 700; }
    .field-stack textarea { border: 1px solid var(--neis-border); border-radius: 0.5rem; padding: 0.75rem; font: inherit; line-height: 1.6; resize: vertical; min-height: 140px; }
    .editor { width: 100%; box-sizing: border-box; min-height: 170px; }
    .section-divider { border-top: 1px solid var(--neis-border-light); padding-top: 1rem; margin-top: 1rem; }
    .result-list { display: flex; flex-direction: column; gap: 0.75rem; }
    .meta-line { color: var(--neis-text-muted); font-size: 0.78rem; line-height: 1.5; }
    @media (max-width: 900px) { .behavior-layout { grid-template-columns: 1fr; } }
  </style>
</head>
<body class="neis-body">
  <section class="neis-card">
    <div class="neis-card-title">행동특성 및 종합의견 작성</div>
    <p class="neis-note">관찰 문장을 입력하면 강점 중심 예시문장과 성장 코칭 예시문장을 생성합니다.</p>

    <div class="behavior-layout section-divider">
      <form id="behavior-form">
        <div class="field-stack">
          <label for="input-text">관찰 문장</label>
          <textarea id="input-text" placeholder="예: 수업 중 집중이 짧지만 친구를 잘 도와주고 모둠 활동에 관심을 보임"></textarea>
        </div>
        <div class="button-row">
          <button class="btn-primary" type="submit" id="generate-btn">예시문장 생성</button>
          <button class="btn-outline" type="button" id="sample-btn">샘플 입력</button>
          <button class="btn-danger-outline" type="button" id="clear-btn">저장 데이터 초기화</button>
        </div>

        <div class="section-divider">
          <div class="neis-subtabs">
            <button class="neis-subtab active" type="button" data-view="strengths">강점 중심</button>
            <button class="neis-subtab" type="button" data-view="coachings">성장 코칭</button>
          </div>
          <div id="strengths-list" class="result-list"></div>
          <div id="coachings-list" class="result-list hidden"></div>
        </div>
      </form>

      <aside>
        <div class="field-stack">
          <label for="final-text">최종 편집 문장</label>
          <textarea id="final-text" class="editor" placeholder="예시문장을 이어 붙이거나 직접 작성하세요."></textarea>
          <div class="meta-line"><span id="byte-count">0 Byte</span> · 예시문장은 복사 후, 최종 편집 문장의 이어 붙이기로 추가할 수 있습니다.</div>
        </div>
        <div class="button-row">
          <button class="btn-outline" type="button" id="append-final-btn">이어 붙이기</button>
          <button class="btn-primary" type="button" id="copy-final-btn">최종 문장 복사</button>
        </div>
      </aside>
    </div>
  </section>

  <script src="../../shared/js/harness.js"></script>
  <script src="./js/app.js"></script>
</body>
</html>
