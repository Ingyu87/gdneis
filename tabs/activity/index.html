<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>자율·자치활동 관리</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../../shared/css/neis-theme.css">
  <style>
    body {
      margin: 0;
      padding: 0;
    }

    .activity-layout {
      display: grid;
      grid-template-columns: minmax(0, 1.05fr) minmax(320px, 0.95fr);
      gap: 1rem;
    }

    .field-stack {
      display: flex;
      flex-direction: column;
      gap: 0.35rem;
      margin-bottom: 0.9rem;
    }

    .field-stack label {
      font-size: 0.875rem;
      font-weight: 700;
    }

    .field-stack select,
    .field-stack input,
    .field-stack textarea {
      border: 1px solid var(--neis-border);
      border-radius: 0.375rem;
      padding: 0.5rem 0.625rem;
      font: inherit;
      background: #fff;
      min-width: 0;
    }

    .field-stack textarea {
      min-height: 76px;
      resize: vertical;
    }

    .term-toggle {
      display: inline-flex;
      border: 1px solid var(--neis-border);
      border-radius: 0.375rem;
      overflow: hidden;
      background: #fff;
    }

    .term-option {
      border: 0;
      border-right: 1px solid var(--neis-border);
      background: #fff;
      color: var(--neis-text);
      min-width: 4.6rem;
      padding: 0.48rem 0.7rem;
      font: inherit;
      font-weight: 700;
      cursor: pointer;
    }

    .term-option:last-child {
      border-right: 0;
    }

    .term-option.active {
      background: #e9f2ff;
      color: var(--neis-primary);
      box-shadow: inset 0 0 0 1px var(--neis-primary);
    }

    .button-row {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      align-items: center;
      margin-top: 1rem;
    }

    .suggestions {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }

    .editor {
      width: 100%;
      min-height: 130px;
      resize: vertical;
      border: 1px solid var(--neis-border);
      border-radius: 0.5rem;
      padding: 0.75rem;
      font: inherit;
      line-height: 1.6;
      box-sizing: border-box;
    }

    .meta-line {
      color: var(--neis-text-muted);
      font-size: 0.78rem;
      line-height: 1.5;
    }

    .section-divider {
      border-top: 1px solid var(--neis-border-light);
      padding-top: 1rem;
      margin-top: 1rem;
    }

    .hidden {
      display: none !important;
    }

    @media (max-width: 900px) {
      .activity-layout {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body class="neis-body">
  <section class="neis-card">
    <div class="neis-card-title">자율·자치활동 특기사항 작성</div>
    <p class="neis-note">학교교육계획과 학년 교육과정에 근거한 활동을 학년·학기별로 선택하고, 상·중·하 예시문장을 만든 뒤 최종 문장에 이어 붙여 수정합니다.</p>

    <div class="activity-layout section-divider">
      <form id="activity-form">
        <div class="neis-filter-row">
          <label for="school-year" class="required">학년도</label>
          <select id="school-year">
            <option value="2026">2026</option>
          </select>

          <label for="grade-select" class="required">학년</label>
          <select id="grade-select">
            <option value="1">1학년</option>
            <option value="2">2학년</option>
            <option value="3">3학년</option>
            <option value="4" selected>4학년</option>
            <option value="5">5학년</option>
            <option value="6">6학년</option>
          </select>

          <label class="required">학기</label>
          <div id="semester-toggle" class="term-toggle" role="group" aria-label="자율활동 학기 선택">
            <button class="term-option active" type="button" data-semester="1">1학기</button>
            <button class="term-option" type="button" data-semester="2">2학기</button>
          </div>
        </div>

        <div class="field-stack">
          <label>활동 근거</label>
          <div id="activity-list" class="choice-list"></div>
          <div id="activity-basis" class="meta-line"></div>
        </div>

        <div class="neis-filter-row">
          <label for="excellent-count">상 문장 수</label>
          <input id="excellent-count" type="number" min="0" max="25" value="3">
          <label for="good-count">중 문장 수</label>
          <input id="good-count" type="number" min="0" max="25" value="3">
          <label for="effort-count">하 문장 수</label>
          <input id="effort-count" type="number" min="0" max="25" value="3">
        </div>

        <div class="section-divider">
          <label class="inline-check">
            <input id="officer-enabled" type="checkbox">
            임원 활동 포함
          </label>

          <div id="officer-fields" class="hidden" style="margin-top:0.75rem;">
            <div class="neis-filter-row">
              <label for="officer-term">임원 학기</label>
              <select id="officer-term">
                <option value="1학기">1학기</option>
                <option value="2학기">2학기</option>
                <option value="1년">1년</option>
              </select>
              <label for="officer-type">종류</label>
              <select id="officer-type">
                <option value="학급">학급</option>
                <option value="학년">학년</option>
                <option value="전교">전교</option>
              </select>
            </div>
            <div class="field-stack">
              <label for="officer-title">직책</label>
              <input id="officer-title" type="text" value="회장">
            </div>
            <div class="field-stack">
              <label for="officer-period">임원 기간</label>
              <input id="officer-period" type="text">
              <div class="meta-line">기재요령 예시: 3학년: 1학기 학급 부회장(2026.03.01.-2026.08.18.)</div>
            </div>
          </div>
        </div>

        <div class="button-row">
          <button class="btn-primary" type="submit" id="generate-btn">AI 예시문장 생성</button>
          <button class="btn-outline" type="button" id="sample-btn">샘플 입력</button>
          <button class="btn-danger-outline" type="button" id="clear-btn">저장 데이터 초기화</button>
        </div>
      </form>

      <aside>
        <div class="field-stack">
          <label for="final-text">최종 편집 문장</label>
          <textarea id="final-text" class="editor" placeholder="예시문장을 이어 붙이거나 직접 문장을 작성하세요."></textarea>
          <div class="meta-line"><span id="byte-count">0 Byte</span> · 예시문장을 누르면 최종 문장 뒤에 이어 붙고, 복사 버튼으로 전체를 복사합니다.</div>
        </div>
        <div class="button-row">
          <button class="btn-primary" type="button" id="copy-final-btn">최종 문장 복사</button>
        </div>

        <div class="section-divider">
          <div class="section-label">종합 및 근거별 예시문장</div>
          <div id="result-list" class="suggestions">
            <p class="neis-note">AI 예시문장 생성 버튼을 누르면 종합 예시문장과 선택한 활동 근거별 예시문장을 제시합니다. 예시문장을 누르면 최종 문장 뒤에 이어 붙습니다.</p>
          </div>
        </div>
      </aside>
    </div>
  </section>

  <script src="../../shared/js/harness.js"></script>
  <script src="./js/app.js"></script>
</body>
</html>
